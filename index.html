<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina's PVP Fighting Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d1a;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Light beams from disco ball */
        #beamCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.9; }
        }

        /* Logo canvas at top */
        #logoCanvas {
            display: block;
            margin: 0 auto 10px auto;
            position: relative;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 52px;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 6px;
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px #a855f7, 0 0 40px #a855f7; }
            33%  { text-shadow: 0 0 25px #f472b6, 0 0 50px #f472b6; }
            66%  { text-shadow: 0 0 25px #38bdf8, 0 0 50px #38bdf8; }
        }

        .subtitle {
            color: #a78bfa;
            font-size: 16px;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .modes {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 36px 46px;
            width: 270px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
            display: block;
        }
        .mode-card:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(255,255,255,0.09);
        }
        .mode-card.local { border-color: #3b82f6; }
        .mode-card.local:hover { border-color: #60a5fa; box-shadow: 0 0 30px rgba(59,130,246,0.5); }
        .mode-card.online { border-color: #a855f7; }
        .mode-card.online:hover { border-color: #c084fc; box-shadow: 0 0 30px rgba(168,85,247,0.5); }

        .mode-icon { font-size: 60px; margin-bottom: 14px; display: block; }
        .mode-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        .mode-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; }
        .mode-card.local .mode-title { color: #60a5fa; }
        .mode-card.online .mode-title { color: #c084fc; }

        .controls-hint {
            margin-top: 44px;
            color: #3d4f63;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .made-by {
            margin-top: 12px;
            color: #2d3a4a;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="beamCanvas"></canvas>
<div class="stars" id="stars"></div>

<div class="content">
    <!-- Logo: disco ball with yeti -->
    <canvas id="logoCanvas" width="220" height="260"></canvas>

    <h1>MINA'S PVP GAME</h1>
    <p class="subtitle">Choose Your Battle Mode</p>

    <div class="modes">
        <a href="/game" class="mode-card local">
            <span class="mode-icon">🎮</span>
            <div class="mode-title">LOCAL</div>
            <div class="mode-desc">Two players, one keyboard. Battle a friend sitting next to you!</div>
        </a>
        <a href="/multiplayer" class="mode-card online">
            <span class="mode-icon">🌐</span>
            <div class="mode-title">ONLINE</div>
            <div class="mode-desc">Play against someone anywhere in the world with a room code!</div>
        </a>
    </div>

    <p class="controls-hint">LOCAL: WASD + Arrow Keys &nbsp;|&nbsp; ONLINE: Each player on their own device</p>
    <p class="made-by">✨ MADE BY MINA ✨</p>
</div>

<script src="/disco_logo.js"></script>
<script>
// =============================================
// STARS
// =============================================
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        animation-duration:${2+Math.random()*3}s;
        animation-delay:${Math.random()*4}s;
    `;
    starsContainer.appendChild(star);
}

// =============================================
// DISCO LOGO CANVAS  (uses shared disco_logo.js)
// =============================================
const logo = document.getElementById('logoCanvas');
const lctx = logo.getContext('2d');
const CX    = logo.width / 2;   // 110
const BALL_Y = 155;
const BALL_R = 70;

let logoAngle = 0;

function drawLogo() {
    lctx.clearRect(0, 0, logo.width, logo.height);
    drawDiscoBall(lctx, CX, BALL_Y, BALL_R, logoAngle);
    drawYeti(lctx, CX, BALL_Y - BALL_R, 1.0);
    logoAngle += 0.04;
}

// =============================================
// BEAM CANVAS  (uses shared disco_logo.js)
// =============================================
const beamCanvas = document.getElementById('beamCanvas');
const bctx = beamCanvas.getContext('2d');
const beams = makeBeams();

function resizeBeamCanvas() {
    beamCanvas.width = window.innerWidth;
    beamCanvas.height = window.innerHeight;
}
resizeBeamCanvas();
window.addEventListener('resize', resizeBeamCanvas);

function doDraw() {
    const rect = logo.getBoundingClientRect();
    drawBeams(bctx, beamCanvas.width, beamCanvas.height,
              rect.left + CX, rect.top + BALL_Y, BALL_R, beams);
}

// =============================================
// MAIN LOOP
// =============================================
function loop() {
    drawLogo();
    doDraw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
