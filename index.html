<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina's PVP Fighting Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d1a;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Light beams from disco ball */
        #beamCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.9; }
        }

        /* Logo canvas at top */
        #logoCanvas {
            display: block;
            margin: 0 auto 10px auto;
            position: relative;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 52px;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 6px;
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px #a855f7, 0 0 40px #a855f7; }
            33%  { text-shadow: 0 0 25px #f472b6, 0 0 50px #f472b6; }
            66%  { text-shadow: 0 0 25px #38bdf8, 0 0 50px #38bdf8; }
        }

        .subtitle {
            color: #a78bfa;
            font-size: 16px;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .modes {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 36px 46px;
            width: 270px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
            display: block;
        }
        .mode-card:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(255,255,255,0.09);
        }
        .mode-card.local { border-color: #3b82f6; }
        .mode-card.local:hover { border-color: #60a5fa; box-shadow: 0 0 30px rgba(59,130,246,0.5); }
        .mode-card.online { border-color: #a855f7; }
        .mode-card.online:hover { border-color: #c084fc; box-shadow: 0 0 30px rgba(168,85,247,0.5); }

        .mode-icon { font-size: 60px; margin-bottom: 14px; display: block; }
        .mode-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        .mode-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; }
        .mode-card.local .mode-title { color: #60a5fa; }
        .mode-card.online .mode-title { color: #c084fc; }

        .controls-hint {
            margin-top: 44px;
            color: #3d4f63;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .made-by {
            margin-top: 12px;
            color: #2d3a4a;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="beamCanvas"></canvas>
<div class="stars" id="stars"></div>

<div class="content">
    <!-- Logo: disco ball with yeti -->
    <canvas id="logoCanvas" width="220" height="260"></canvas>

    <h1>MINA'S PVP GAME</h1>
    <p class="subtitle">Choose Your Battle Mode</p>

    <div class="modes">
        <a href="/game" class="mode-card local">
            <span class="mode-icon">🎮</span>
            <div class="mode-title">LOCAL</div>
            <div class="mode-desc">Two players, one keyboard. Battle a friend sitting next to you!</div>
        </a>
        <a href="/multiplayer" class="mode-card online">
            <span class="mode-icon">🌐</span>
            <div class="mode-title">ONLINE</div>
            <div class="mode-desc">Play against someone anywhere in the world with a room code!</div>
        </a>
    </div>

    <p class="controls-hint">LOCAL: WASD + Arrow Keys &nbsp;|&nbsp; ONLINE: Each player on their own device</p>
    <p class="made-by">✨ MADE BY MINA ✨</p>
</div>

<script>
// =============================================
// STARS
// =============================================
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        animation-duration:${2+Math.random()*3}s;
        animation-delay:${Math.random()*4}s;
    `;
    starsContainer.appendChild(star);
}

// =============================================
// DISCO LOGO CANVAS
// =============================================
const logo = document.getElementById('logoCanvas');
const lctx = logo.getContext('2d');
const CX = logo.width / 2;   // 110
const BALL_Y = 155;           // centre of ball
const BALL_R = 70;            // ball radius
const STRING_TOP = 0;

let logoAngle = 0; // rotation for tile shimmer

// Neon beam colours cycling
const beamColors = ['#ff00ff','#00ffff','#ff4500','#00ff88','#ffff00','#ff69b4','#00bfff'];

function drawLogo() {
    lctx.clearRect(0, 0, logo.width, logo.height);

    // --- string from top ---
    lctx.strokeStyle = '#aaa';
    lctx.lineWidth = 2;
    lctx.beginPath();
    lctx.moveTo(CX, STRING_TOP);
    lctx.lineTo(CX, BALL_Y - BALL_R);
    lctx.stroke();

    // --- iridescent glow around ball ---
    const t = Date.now() / 800;
    const glowR = (Math.sin(t) + 1) / 2; // 0-1
    const glowG = (Math.sin(t + 2) + 1) / 2;
    const glowB = (Math.sin(t + 4) + 1) / 2;
    const grd = lctx.createRadialGradient(CX, BALL_Y, BALL_R * 0.3, CX, BALL_Y, BALL_R * 2.2);
    grd.addColorStop(0, `rgba(${Math.floor(glowR*255)},${Math.floor(glowG*255)},${Math.floor(glowB*255)},0.35)`);
    grd.addColorStop(0.5, `rgba(${Math.floor(glowR*200)},${Math.floor(glowB*255)},${Math.floor(glowG*200)},0.15)`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    lctx.fillStyle = grd;
    lctx.beginPath();
    lctx.arc(CX, BALL_Y, BALL_R * 2.2, 0, Math.PI * 2);
    lctx.fill();

    // --- ball base (silver sphere) ---
    const ballGrd = lctx.createRadialGradient(CX - 20, BALL_Y - 20, 5, CX, BALL_Y, BALL_R);
    ballGrd.addColorStop(0, '#ffffff');
    ballGrd.addColorStop(0.3, '#c0c8d8');
    ballGrd.addColorStop(0.7, '#7080a0');
    ballGrd.addColorStop(1, '#303850');
    lctx.fillStyle = ballGrd;
    lctx.beginPath();
    lctx.arc(CX, BALL_Y, BALL_R, 0, Math.PI * 2);
    lctx.fill();

    // --- mirror tiles ---
    lctx.save();
    lctx.beginPath();
    lctx.arc(CX, BALL_Y, BALL_R, 0, Math.PI * 2);
    lctx.clip();

    const TILE = 14;
    const cols = Math.ceil((BALL_R * 2) / TILE) + 2;
    const rows = Math.ceil((BALL_R * 2) / TILE) + 2;

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const tx = CX - BALL_R - TILE + col * TILE;
            const ty = BALL_Y - BALL_R - TILE + row * TILE;

            // shimmer brightness based on angle + time
            const shimmer = (Math.sin(logoAngle + col * 0.8 + row * 0.6) + 1) / 2;
            const bright = Math.floor(100 + shimmer * 155);

            // colour tint cycles per tile
            const hue = (logoAngle * 40 + col * 25 + row * 35) % 360;
            const sat = shimmer > 0.7 ? 60 : 10;

            lctx.fillStyle = `hsl(${hue}, ${sat}%, ${Math.floor(bright * 0.6)}%)`;
            lctx.fillRect(tx + 1, ty + 1, TILE - 2, TILE - 2);

            // bright flash on some tiles
            if (shimmer > 0.85) {
                lctx.fillStyle = `rgba(255,255,255,${(shimmer - 0.85) * 4})`;
                lctx.fillRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
            }
        }
    }

    // grid lines
    lctx.strokeStyle = 'rgba(0,0,0,0.25)';
    lctx.lineWidth = 0.5;
    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const tx = CX - BALL_R - TILE + col * TILE;
            const ty = BALL_Y - BALL_R - TILE + row * TILE;
            lctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        }
    }
    lctx.restore();

    // --- specular highlight ---
    const spec = lctx.createRadialGradient(CX - 22, BALL_Y - 22, 2, CX - 15, BALL_Y - 15, 28);
    spec.addColorStop(0, 'rgba(255,255,255,0.9)');
    spec.addColorStop(1, 'rgba(255,255,255,0)');
    lctx.fillStyle = spec;
    lctx.beginPath();
    lctx.arc(CX, BALL_Y, BALL_R, 0, Math.PI * 2);
    lctx.fill();

    // =============================================
    // YETI peeking out the top
    // =============================================
    const YX = CX;
    const YY = BALL_Y - BALL_R + 2; // sits right at top of ball

    // Yeti body / shoulders (white fluffy)
    lctx.fillStyle = '#e8eef5';
    lctx.beginPath();
    lctx.ellipse(YX, YY - 2, 30, 20, 0, Math.PI, 0); // half-circle shoulders
    lctx.fill();

    // Yeti head
    lctx.fillStyle = '#dce6f0';
    lctx.beginPath();
    lctx.arc(YX, YY - 22, 22, 0, Math.PI * 2);
    lctx.fill();

    // Fur texture on head (fluffy outline)
    lctx.strokeStyle = '#b0c4de';
    lctx.lineWidth = 2;
    for (let a = 0; a < Math.PI * 2; a += 0.4) {
        const fx = YX + Math.cos(a) * 22;
        const fy = YY - 22 + Math.sin(a) * 22;
        const fx2 = YX + Math.cos(a) * 27;
        const fy2 = YY - 22 + Math.sin(a) * 27;
        lctx.beginPath();
        lctx.moveTo(fx, fy);
        lctx.lineTo(fx2, fy2);
        lctx.stroke();
    }

    // Yeti glowing red eyes
    const eyeGlow = (Math.sin(Date.now() / 300) + 1) / 2;
    lctx.shadowBlur = 8 + eyeGlow * 6;
    lctx.shadowColor = '#ff0000';
    lctx.fillStyle = `rgb(${200 + Math.floor(eyeGlow*55)}, 0, 0)`;
    lctx.beginPath(); lctx.arc(YX - 8, YY - 24, 4, 0, Math.PI*2); lctx.fill();
    lctx.beginPath(); lctx.arc(YX + 8, YY - 24, 4, 0, Math.PI*2); lctx.fill();
    lctx.shadowBlur = 0;

    // Fangs
    lctx.fillStyle = '#fff';
    lctx.beginPath();
    lctx.moveTo(YX - 5, YY - 12);
    lctx.lineTo(YX - 3, YY - 5);
    lctx.lineTo(YX - 1, YY - 12);
    lctx.fill();
    lctx.beginPath();
    lctx.moveTo(YX + 1, YY - 12);
    lctx.lineTo(YX + 3, YY - 5);
    lctx.lineTo(YX + 5, YY - 12);
    lctx.fill();

    // Mini sign the yeti holds
    const signT = Date.now() / 1000;
    const signSwing = Math.sin(signT * 1.5) * 6;

    lctx.save();
    lctx.translate(YX + 28, YY - 18 + signSwing);
    lctx.rotate(0.15 + Math.sin(signT) * 0.08);

    // Sign post
    lctx.strokeStyle = '#8B4513';
    lctx.lineWidth = 2;
    lctx.beginPath();
    lctx.moveTo(0, 0); lctx.lineTo(0, 20); lctx.stroke();

    // Sign board
    lctx.fillStyle = '#f5deb3';
    lctx.strokeStyle = '#8B4513';
    lctx.lineWidth = 1;
    lctx.fillRect(-18, -14, 36, 16);
    lctx.strokeRect(-18, -14, 36, 16);

    // Sign text alternates
    const showBeaten = Math.floor(Date.now() / 2000) % 2 === 0;
    lctx.fillStyle = '#8B0000';
    lctx.font = 'bold 5px Arial';
    lctx.textAlign = 'center';
    lctx.fillText(showBeaten ? 'MINA IS' : 'DEFEATED', 0, -4);
    lctx.fillText(showBeaten ? 'THE BEAST' : '😵', 0, 5);
    lctx.restore();

    logoAngle += 0.04;
}

// =============================================
// BEAM CANVAS — light rays cast by disco ball
// =============================================
const beamCanvas = document.getElementById('beamCanvas');
const bctx = beamCanvas.getContext('2d');

function resizeBeamCanvas() {
    beamCanvas.width = window.innerWidth;
    beamCanvas.height = window.innerHeight;
}
resizeBeamCanvas();
window.addEventListener('resize', resizeBeamCanvas);

// Find where disco ball is in page coords
function getBallCenter() {
    const rect = logo.getBoundingClientRect();
    return {
        x: rect.left + CX,
        y: rect.top + BALL_Y
    };
}

let beams = [];
// Create beams
for (let i = 0; i < 12; i++) {
    beams.push({
        angle: (i / 12) * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.5,
        color: beamColors[i % beamColors.length],
        length: 0.5 + Math.random() * 0.7,
        width: 3 + Math.random() * 5,
        alpha: 0.15 + Math.random() * 0.25,
    });
}

function drawBeams() {
    bctx.clearRect(0, 0, beamCanvas.width, beamCanvas.height);
    const ball = getBallCenter();

    for (let b of beams) {
        b.angle += b.speed * 0.012;

        const maxLen = Math.max(beamCanvas.width, beamCanvas.height) * b.length;
        const endX = ball.x + Math.cos(b.angle) * maxLen;
        const endY = ball.y + Math.sin(b.angle) * maxLen;

        const grad = bctx.createLinearGradient(ball.x, ball.y, endX, endY);
        grad.addColorStop(0, b.color.replace(')', `,${b.alpha})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace('rgba(', 'rgba('));

        // parse hex color manually
        const hex = b.color;
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const bl = parseInt(hex.slice(5,7),16);

        const grd = bctx.createLinearGradient(ball.x, ball.y, endX, endY);
        grd.addColorStop(0, `rgba(${r},${g},${bl},${b.alpha})`);
        grd.addColorStop(1, `rgba(${r},${g},${bl},0)`);

        bctx.strokeStyle = grd;
        bctx.lineWidth = b.width;
        bctx.beginPath();
        bctx.moveTo(ball.x, ball.y);
        bctx.lineTo(endX, endY);
        bctx.stroke();

        // Flashing dot at origin
        const flash = (Math.sin(Date.now()/150 + b.angle * 3) + 1) / 2;
        bctx.fillStyle = `rgba(${r},${g},${bl},${flash * 0.9})`;
        bctx.beginPath();
        bctx.arc(ball.x + Math.cos(b.angle) * (BALL_R + 5), ball.y + Math.sin(b.angle) * (BALL_R + 5), 3 + flash * 3, 0, Math.PI * 2);
        bctx.fill();
    }
}

// =============================================
// MAIN LOOP
// =============================================
function loop() {
    drawLogo();
    drawBeams();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
