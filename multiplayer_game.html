<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Battle - Mina's PVP Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        #gameCanvas {
            display: block;
            border-radius: 10px;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .healthBar {
            width: 200px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #fff;
        }

        .healthFill {
            height: 100%;
            transition: width 0.3s;
        }

        #p1Health .healthFill { background: linear-gradient(90deg, #3498db, #2980b9); }
        #p2Health .healthFill { background: linear-gradient(90deg, #e74c3c, #c0392b); }

        .playerInfo {
            text-align: center;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
        }

        .playerInfo span {
            display: block;
            margin-bottom: 5px;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            font-family: 'Press Start 2P', cursive;
            z-index: 100;
        }

        #gameOver h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #f39c12;
        }

        #gameOver p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            text-align: center;
        }

        #connectionStatus {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-family: 'VT323', monospace;
        }

        .connected { background: #27ae60; color: white; }
        .disconnected { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="connectionStatus" class="connected">Connected</div>
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="ui">
            <div class="playerInfo">
                <span>PLAYER 1</span>
                <div class="healthBar" id="p1Health">
                    <div class="healthFill" style="width: 100%"></div>
                </div>
                <span id="p1Weapon">Sword</span>
            </div>
            <div class="playerInfo">
                <span>PLAYER 2</span>
                <div class="healthBar" id="p2Health">
                    <div class="healthFill" style="width: 100%"></div>
                </div>
                <span id="p2Weapon">Sword</span>
            </div>
        </div>
        <div id="gameOver">
            <h2 id="winnerText">PLAYER 1 WINS!</h2>
            <p>Returning to lobby...</p>
        </div>
        <div id="controls">
            WASD or Arrow Keys to move | S or Down to attack | Space or Enter for ability | 1-2-3 switch weapons
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/game_engine.js"></script>
    <script>
        // Get room info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const myPlayerNum = parseInt(urlParams.get('player'));
        const mapName = urlParams.get('map') || 'Normal';

        if (!roomCode || !myPlayerNum) {
            alert('Invalid game session! Returning to lobby.');
            window.location.href = '/multiplayer';
        }

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Connect to server
        const socket = io();

        // Game constants — loaded from server via /game-data (see fetchGameData below)
        let GRAVITY = 0.8;
        let JUMP_STRENGTH = -15;
        let PLAYER_SPEED = 5;
        let PLAYER_WIDTH = 40;
        let PLAYER_HEIGHT = 60;
        let ATTACK_COOLDOWN = 60; // Frames (synced from game_data.py)
        let GAME_DATA = null;

        // Keyboard state — arrow keys are mirrored to WASD so game_engine.js controls work
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            // Mirror arrow keys → WASD so game_engine.js Player.move() works
            if (e.key === 'ArrowLeft')  keys['a'] = true;
            if (e.key === 'ArrowRight') keys['d'] = true;
            if (e.key === 'ArrowUp')    keys['w'] = true;
        }, true);

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if (e.key === 'ArrowLeft')  keys['a'] = false;
            if (e.key === 'ArrowRight') keys['d'] = false;
            if (e.key === 'ArrowUp')    keys['w'] = false;
        }, true);

        // =====================================================================
        // SEEDED RNG — both clients derive the same seed from the room code
        // so hazards spawn at exactly the same time and position on both screens
        // =====================================================================
        let hazardSeed = (function() {
            let seed = 0;
            for (let i = 0; i < roomCode.length; i++) {
                seed = (seed * 31 + roomCode.charCodeAt(i)) & 0xffffffff;
            }
            return Math.abs(seed) || 12345;
        })();

        function seededRandom() {
            hazardSeed = (hazardSeed * 1664525 + 1013904223) & 0xffffffff;
            return (hazardSeed >>> 0) / 0xffffffff;
        }

        let frameCount = 0;
        let hazardSpawnTimers = {
            comet: 0,
            nextCometThreshold: 0,
            icicle: 0,
            nextIcicleThreshold: 0,
            lavaRise: 0
        };

        // Maps data — built from game_data.py via /game-data fetch below.
        // Hazard lists are derived from the hazard types in each map's hazard array.
        let MAPS = {};

        function buildMapsFromGameData(mapsData) {
            // Convert game_data.py format → the format multiplayer_game.html expects
            // game_data.py hazards look like: [{type: "comet", ...}, {type: "lava", ...}]
            // We just need the type names as an array
            const result = {};
            for (const m of mapsData) {
                result[m.name] = {
                    platforms: m.platforms || [],
                    hazards: (m.hazards || []).map(h => h.type)
                };
            }
            return result;
        }

        // Fallback MAPS in case /game-data hasn't loaded yet
        const MAPS_FALLBACK = {
            'Normal': {
                platforms: [
                    {x: 0, y: 650, width: 1200, height: 50},
                    {x: 200, y: 550, width: 200, height: 20},
                    {x: 800, y: 550, width: 200, height: 20},
                    {x: 100, y: 430, width: 150, height: 20},
                    {x: 500, y: 400, width: 200, height: 20},
                    {x: 950, y: 430, width: 150, height: 20},
                    {x: 500, y: 250, width: 200, height: 20},
                ],
                hazards: []
            },
        };

        MAPS = MAPS_FALLBACK;  // Will be replaced after fetch

        let currentMap = MAPS[mapName] || MAPS['Normal'];

        // Game state
        let gameState = {
            gameOver: false,
            winner: null,
            currentMap: null, // set in initGame() — game_engine.js Player.move() reads this
            lavaHeight: 50,
            lavaRiseTimer: 0,
            comets: [],
            icicles: [],
            spaceships: [],
            projectiles: [],
            breakableCubes: [],
            inMinigame: false // game_engine.js checks this for local boundary split
        };

        // Players
        let myPlayer = null;
        let opponent = null;
        let cachedPlatforms = [];

        // Load weapons from localStorage (set by lobby)
        const savedWeapons = JSON.parse(localStorage.getItem('mp_game_weapons') || '[{"name":"Sword","damage":10,"type":"melee"}]');
        const _rawAbility = localStorage.getItem('mp_game_ability');
        const savedAbility = (_rawAbility && _rawAbility.length > 0) ? _rawAbility : null;
        localStorage.removeItem('mp_game_ability'); // clear so it doesn't carry to next game

        // Use first 3 weapons from inventory
        const WEAPONS = savedWeapons.slice(0, 3);
        while (WEAPONS.length < 3) {
            WEAPONS.push({name: 'Sword', damage: 10, type: 'melee'});
        }

        // =====================================================================
        // MULTIPLAYER PROJECTILE
        // (Comet, Icicle, BreakableCube, Spaceship, Player all come from game_engine.js)
        // =====================================================================

        // MPProjectile — like game_engine.js Projectile but emits socket damage on hit
        class MPProjectile {
            constructor(x, y, dir, damage, color) {
                this.x = x;
                this.y = y;
                this.dir = dir;
                this.speed = 12;
                this.damage = damage;
                this.color = color;
                this.width = 20;
                this.height = 8;
                this.active = true;
            }

            update() {
                this.x += this.dir * this.speed;
                if (this.x < -50 || this.x > canvas.width + 50) {
                    this.active = false;
                }
                if (this.active &&
                    this.x + this.width > opponent.x &&
                    this.x < opponent.x + opponent.width &&
                    this.y + this.height > opponent.y &&
                    this.y < opponent.y + opponent.height) {
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'damage',
                        action_data: { damage: this.damage, targetPlayer: opponent.playerNum }
                    });
                    this.active = false;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        // =====================================================================
        // INIT GAME
        // =====================================================================

        function initGame() {
            const p1Color = '#3498db';
            const p2Color = '#e74c3c';

            // game_engine.js Player(x, y, color, name, controls)
            // In multiplayer each player is on their own device, so WASD + arrow keys both work
            const mpControls = { left: 'a', right: 'd', jump: 'w', attack: 's',
                                  left2: 'ArrowLeft', right2: 'ArrowRight', jump2: 'ArrowUp' };

            // Spawn higher on dangerous maps so players don't start in lava/acid
            const spawnY = (mapName === 'Volcano' || mapName === 'Breakable Cubes') ? 200 : 500;

            if (myPlayerNum === 1) {
                myPlayer = new Player(100, spawnY, p1Color, 'Player 1', mpControls);
                opponent = new Player(1000, spawnY, p2Color, 'Player 2', mpControls);
            } else {
                myPlayer = new Player(1000, spawnY, p2Color, 'Player 2', mpControls);
                opponent = new Player(100, spawnY, p1Color, 'Player 1', mpControls);
            }

            // Store player number on the player object for damage targeting
            myPlayer.playerNum = myPlayerNum;
            opponent.playerNum = myPlayerNum === 1 ? 2 : 1;

            // Assign weapons — WEAPONS is already padded to 3 entries above
            myPlayer.weapons = WEAPONS;
            // Give opponent a default set — their weapon index is synced via network state
            opponent.weapons = [{ name: 'Sword', damage: 10, type: 'melee' },
                                 { name: 'Sword', damage: 10, type: 'melee' },
                                 { name: 'Sword', damage: 10, type: 'melee' }];

            // game_engine.js uses 'ice', 'breakable_cubes' etc. for gameState.currentMap
            gameState.currentMap = mapName.toLowerCase().replace(/ /g, '_');

            // Cache Platform instances so we don't recreate them every frame
            cachedPlatforms = currentMap.platforms.map(p => new Platform(p.x, p.y, p.width, p.height));

            opponent.isPuppet = true;

            // Assign saved ability — game_engine.js uses lowercase ability names
            if (savedAbility) {
                myPlayer.ability = savedAbility.toLowerCase();
            }

            // Initialize map-specific hazards
            if (mapName === 'Alien Invasion') {
                gameState.spaceships = [
                    new Spaceship(300, 60),
                    new Spaceship(900, 80)
                ];
            }
            if (mapName === 'Volcano') {
                gameState.lavaHeight = 50;
            }

            // Breakable Cubes map: create the cube platforms
            if (mapName === 'Breakable Cubes') {
                const cs = 40, gY = canvas.height - 50;
                const configs = [
                    [100, gY-80, 3], [400, gY-80, 3], [700, gY-80, 3], [1000, gY-80, 2],
                    [250, gY-200, 2], [550, gY-200, 3], [850, gY-200, 2],
                    [100, gY-320, 3], [400, gY-320, 2], [700, gY-320, 3],
                    [250, gY-440, 2], [550, gY-440, 4], [900, gY-440, 2],
                    [400, gY-560, 3]
                ];
                for (let [sx, y, n] of configs) {
                    for (let i = 0; i < n; i++) gameState.breakableCubes.push(new BreakableCube(sx + i*cs, y, cs));
                }
            }

            // Initial spawn thresholds (Player 1 controls hazard spawning)
            hazardSpawnTimers.nextCometThreshold = Math.floor(60 + Math.random() * 120);
            hazardSpawnTimers.nextIcicleThreshold = Math.floor(120 + Math.random() * 60);

            gameReady = true; // signal that it's safe to start the game loop
        }

        // drawBackground() and drawTree() / drawCloud() come from game_engine.js

        function drawPlatforms() {
            for (let plat of currentMap.platforms) {
                if (mapName === 'Ice') {
                    ctx.fillStyle = '#a8d8f0';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillRect(plat.x, plat.y, plat.width, 4);
                } else if (mapName === 'Volcano') {
                    ctx.fillStyle = '#555';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.strokeStyle = '#FF4500'; ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                } else if (mapName === 'Alien Invasion') {
                    ctx.fillStyle = '#1a1a40';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.strokeStyle = '#4040ff'; ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                } else {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.strokeStyle = '#654321'; ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                }
            }
            // Breakable cubes (drawn by their own draw() method)
            if (mapName === 'Breakable Cubes') {
                for (let cube of gameState.breakableCubes) cube.draw();
            }
        }

        function drawHazards() {
            // Lava (Volcano)
            if (mapName === 'Volcano' && gameState.lavaHeight > 0) {
                const lavaGrad = ctx.createLinearGradient(0, canvas.height - gameState.lavaHeight, 0, canvas.height);
                lavaGrad.addColorStop(0, '#FF6000');
                lavaGrad.addColorStop(0.4, '#FF2200');
                lavaGrad.addColorStop(1, '#AA0000');
                ctx.fillStyle = lavaGrad;
                ctx.fillRect(0, canvas.height - gameState.lavaHeight, canvas.width, gameState.lavaHeight);
                // Lava surface shimmer
                ctx.fillStyle = 'rgba(255,200,0,0.3)';
                ctx.fillRect(0, canvas.height - gameState.lavaHeight, canvas.width, 4);
            }

            // Crater + spaceships (Alien Invasion)
            if (mapName === 'Alien Invasion') {
                // Crater
                ctx.fillStyle = '#020210';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 85, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#1a1a40';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 85, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,0,50,0.15)';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 60, 0, Math.PI * 2);
                ctx.fill();

                // Ships + beams
                for (let ship of gameState.spaceships) {
                    ship.draw();
                }
            }

            // Comets
            for (let c of gameState.comets) c.draw();

            // Icicles
            for (let ic of gameState.icicles) ic.draw();
        }

        function updateUI() {
            const p1 = myPlayerNum === 1 ? myPlayer : opponent;
            const p2 = myPlayerNum === 2 ? myPlayer : opponent;

            document.querySelector('#p1Health .healthFill').style.width = (p1.health / p1.maxHealth * 100) + '%';
            document.querySelector('#p2Health .healthFill').style.width = (p2.health / p2.maxHealth * 100) + '%';
            const w1 = p1.weapons[p1.currentWeaponIndex];
            const w2 = p2.weapons[p2.currentWeaponIndex];
            document.getElementById('p1Weapon').textContent = w1 ? w1.name : '';
            document.getElementById('p2Weapon').textContent = w2 ? w2.name : '';
        }

        // =====================================================================
        // ATTACK COLLISION
        // =====================================================================

        function checkAttackCollision() {
            // game_engine.js uses attackTimer (counts down 15→0) and currentWeaponIndex
            // Hit window is attackTimer 10-14 (same as local game), one hit per swing
            if (myPlayer.checkMeleeHit(opponent)) {
                const weapon = myPlayer.getCurrentWeapon();
                if (weapon) {
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'damage',
                        action_data: { damage: weapon.damage, targetPlayer: opponent.playerNum }
                    });
                }
            }
        }

        // =====================================================================
        // HAZARD UPDATES (deterministic — runs same on both clients)
        // =====================================================================

        let hazardIdCounter = 0;
        function nextHazardId() { return ++hazardIdCounter; }

        function spawnCometFromData(data) {
            const c = new Comet();
            c.x = data.x;
            c.speed = data.speed;
            c.damage = data.damage;
            c.id = data.id;
            gameState.comets.push(c);
        }

        function spawnIcicleFromData(data) {
            const ic = new Icicle(data.x, data.y);
            ic.id = data.id;
            gameState.icicles.push(ic);
        }

        function updateHazards() {
            // --- Comet Field ---
            // Player 1 is the authority: spawns comets and broadcasts to Player 2
            if (mapName === 'Comet Field') {
                if (myPlayerNum === 1) {
                    hazardSpawnTimers.comet++;
                    if (hazardSpawnTimers.comet >= hazardSpawnTimers.nextCometThreshold) {
                        const c = new Comet();
                        c.id = nextHazardId();
                        gameState.comets.push(c);
                        hazardSpawnTimers.comet = 0;
                        hazardSpawnTimers.nextCometThreshold = Math.floor(60 + Math.random() * 120);
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'hazard',
                            action_data: { type: 'comet', id: c.id, x: c.x, speed: c.speed, damage: c.damage }
                        });
                    }
                }
                for (let i = gameState.comets.length - 1; i >= 0; i--) {
                    const c = gameState.comets[i];
                    c.update();
                    if (!c.active) { gameState.comets.splice(i, 1); continue; }
                    if (c.checkHit(myPlayer)) {
                        myPlayer.takeDamage(c.damage);
                        // Tell the other screen to remove this comet too
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'hazard_remove',
                            action_data: { type: 'comet', id: c.id }
                        });
                        gameState.comets.splice(i, 1);
                    }
                }
            }

            // --- Ice ---
            // Player 1 is the authority: spawns icicles and broadcasts to Player 2
            if (mapName === 'Ice') {
                if (myPlayerNum === 1) {
                    hazardSpawnTimers.icicle++;
                    if (hazardSpawnTimers.icicle >= hazardSpawnTimers.nextIcicleThreshold) {
                        const highPlatform = currentMap.platforms[currentMap.platforms.length - 1];
                        const numIcicles = 3 + Math.floor(Math.random() * 3);
                        const icicleData = [];
                        for (let i = 0; i < numIcicles; i++) {
                            const ix = highPlatform.x + Math.random() * highPlatform.width;
                            const ic = new Icicle(ix, highPlatform.y);
                            ic.id = nextHazardId();
                            gameState.icicles.push(ic);
                            icicleData.push({ id: ic.id, x: ix, y: highPlatform.y });
                        }
                        hazardSpawnTimers.icicle = 0;
                        hazardSpawnTimers.nextIcicleThreshold = Math.floor(120 + Math.random() * 60);
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'hazard',
                            action_data: { type: 'icicles', icicles: icicleData }
                        });
                    }
                }
                for (let i = gameState.icicles.length - 1; i >= 0; i--) {
                    const ic = gameState.icicles[i];
                    ic.update();
                    if (!ic.active) { gameState.icicles.splice(i, 1); continue; }
                    if (ic.checkHit(myPlayer)) {
                        myPlayer.takeDamage(ic.damage);
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'hazard_remove',
                            action_data: { type: 'icicle', id: ic.id }
                        });
                        gameState.icicles.splice(i, 1);
                    }
                }
            }

            // --- Volcano: rising lava ---
            if (mapName === 'Volcano') {
                hazardSpawnTimers.lavaRise++;
                if (hazardSpawnTimers.lavaRise >= 1200) {
                    gameState.lavaHeight = Math.min(gameState.lavaHeight + 80, 420);
                    hazardSpawnTimers.lavaRise = 0;
                }
                const lavaY = canvas.height - gameState.lavaHeight;
                if (myPlayer.y + myPlayer.height >= lavaY) {
                    myPlayer.takeDamage(5);
                }
            }

            // --- Alien Invasion: beam lift + crater death ---
            if (mapName === 'Alien Invasion') {
                for (let ship of gameState.spaceships) {
                    ship.update();
                    if (ship.checkBeamHit(myPlayer)) {
                        myPlayer.y = Math.max(myPlayer.y - 4, 50);
                        myPlayer.velY = 0;
                    }
                }
                // Crater instant death
                const craterX = canvas.width / 2;
                const craterRadius = 85;
                const myCx = myPlayer.x + myPlayer.width / 2;
                const myFeet = myPlayer.y + myPlayer.height;
                const dist = Math.sqrt(Math.pow(myCx - craterX, 2) + Math.pow(myFeet - (canvas.height - 50), 2));
                if (dist < craterRadius && myFeet > canvas.height - 120) {
                    myPlayer.health = 0;
                }
            }

            // --- Breakable Cubes: acid floor instant death + cube updates ---
            if (mapName === 'Breakable Cubes') {
                if (myPlayerNum === 1) {
                    // Player 1 is authority — runs physics and broadcasts cube state every 3 frames
                    for (let cube of gameState.breakableCubes) {
                        cube.update(myPlayer, opponent);
                    }
                    if (frameCount % 3 === 0) {
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'cubes',
                            action_data: {
                                states: gameState.breakableCubes.map(c => ({
                                    isBroken: c.isBroken,
                                    breakTimer: c.breakTimer,
                                    reformTimer: c.reformTimer,
                                    isBeingSteppedOn: c.isBeingSteppedOn
                                }))
                            }
                        });
                    }
                }
                // Acid floor kills you instantly
                if (myPlayer.y + myPlayer.height >= canvas.height - 50) {
                    myPlayer.health = 0;
                }
            }
        }

        // =====================================================================
        // GAME LOOP
        // =====================================================================

        let lastSendTime = 0;
        let networkReady = false;
        let gameStarted = false;
        let gameReady = false; // set to true when initGame finishes

        function startGame() {
            if (gameStarted) return;
            if (!gameReady) {
                setTimeout(startGame, 100);
                return;
            }
            gameStarted = true;
            networkReady = true;
            gameLoop();
        }

        // Start after 1.5s — enough time for both sockets to connect and rejoin.
        setTimeout(startGame, 1500);

        function showError(e) {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ERROR on frame ' + frameCount + ':', canvas.width/2, 180);
            ctx.fillStyle = 'white';
            ctx.font = '18px Arial';
            const words = e.message.split(' ');
            let line = '', y = 220;
            for (let w of words) {
                if ((line + w).length > 55) {
                    ctx.fillText(line, canvas.width/2, y);
                    line = w + ' '; y += 28;
                } else { line += w + ' '; }
            }
            ctx.fillText(line, canvas.width/2, y);
            if (e.stack) {
                ctx.fillStyle = 'yellow';
                ctx.font = '14px Arial';
                const stackLines = e.stack.split('\n').slice(1, 4);
                stackLines.forEach((sl, i) => ctx.fillText(sl.trim(), canvas.width/2, y + 40 + i*20));
            }
        }

        function gameLoop() {
            if (gameState.gameOver) return;
            try {
                runGameLoop();
            } catch(e) {
                showError(e);
                return; // stop loop on crash
            }
            requestAnimationFrame(gameLoop);
        }

        function runGameLoop() {
            frameCount++;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background (game_engine.js drawBackground takes a map identifier)
            drawBackground(gameState.currentMap);

            // Draw hazards behind platforms (lava, crater, beams)
            drawHazards();

            // Draw platforms
            drawPlatforms();

            // Update players — game_engine.js Player.move() takes Platform instances
            myPlayer.move(cachedPlatforms);
            myPlayer.updateTimers();
            opponent.updatePuppet();

            // Update hazards (damage + spawning)
            updateHazards();

            // Check melee attack collision
            checkAttackCollision();

            // Draw players
            const p1 = myPlayerNum === 1 ? myPlayer : opponent;
            const p2 = myPlayerNum === 2 ? myPlayer : opponent;
            p1.draw();
            p2.draw();

            // Draw projectiles
            for (let proj of gameState.projectiles) {
                proj.update();
                proj.draw();
            }
            gameState.projectiles = gameState.projectiles.filter(p => p.active);

            // Update UI
            updateUI();

            // Send my position to server (throttled to 20x/second, only once both players are in the room)
            const now = Date.now();
            if (networkReady && now - lastSendTime > 50) {
                socket.emit('player_action', {
                    code: roomCode,
                    action: 'move',
                    action_data: myPlayer.getState()
                });
                lastSendTime = now;
            }

            // Win condition
            if (opponent.health <= 0 && !gameState.gameOver) {
                gameState.gameOver = true;
                gameState.winner = myPlayerNum;
                socket.emit('game_over', { code: roomCode, winner: myPlayerNum });
            }
            if (myPlayer.health <= 0 && !gameState.gameOver) {
                gameState.gameOver = true;
                gameState.winner = opponent.playerNum;
                socket.emit('game_over', { code: roomCode, winner: opponent.playerNum });
            }
        }

        // =====================================================================
        // SOCKET EVENTS
        // =====================================================================

        socket.on('connect', () => {
            document.getElementById('connectionStatus').className = 'connected';
            document.getElementById('connectionStatus').textContent = 'Connected';
            socket.emit('rejoin_game', { code: roomCode, player: myPlayerNum });
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').className = 'disconnected';
            document.getElementById('connectionStatus').textContent = 'Disconnected';
        });

        // Both players are in the room — start the game loop now
        socket.on('both_ready', () => {
            startGame();
        });

        socket.on('opponent_action', (data) => {
            if (data.action === 'move') {
                opponent.setState(data.data);

            } else if (data.action === 'damage') {
                if (data.data.targetPlayer === myPlayerNum) {
                    myPlayer.takeDamage(data.data.damage);
                }

            } else if (data.action === 'attack') {
                opponent.isAttacking = true;
                opponent.attackTimer = 15;

            } else if (data.action === 'cubes') {
                // Player 2 receives cube state from Player 1 and applies it
                const states = data.data.states;
                for (let i = 0; i < states.length && i < gameState.breakableCubes.length; i++) {
                    gameState.breakableCubes[i].isBroken = states[i].isBroken;
                    gameState.breakableCubes[i].breakTimer = states[i].breakTimer;
                    gameState.breakableCubes[i].reformTimer = states[i].reformTimer;
                    gameState.breakableCubes[i].isBeingSteppedOn = states[i].isBeingSteppedOn;
                }

            } else if (data.action === 'hazard') {
                if (data.data.type === 'comet') {
                    spawnCometFromData(data.data);
                } else if (data.data.type === 'icicles') {
                    for (const ic of data.data.icicles) spawnIcicleFromData(ic);
                }

            } else if (data.action === 'hazard_remove') {
                if (data.data.type === 'comet') {
                    const idx = gameState.comets.findIndex(c => c.id === data.data.id);
                    if (idx !== -1) gameState.comets.splice(idx, 1);
                } else if (data.data.type === 'icicle') {
                    const idx = gameState.icicles.findIndex(ic => ic.id === data.data.id);
                    if (idx !== -1) gameState.icicles.splice(idx, 1);
                }

            } else if (data.action === 'ability') {
                // game_engine.js uses lowercase ability names
                opponent.ability = data.data.ability.toLowerCase();
                opponent.abilityActive = true;
                opponent.abilityDuration = 600;
                // Teleport: snap puppet to the received position immediately
                if (data.data.ability.toLowerCase() === 'teleport') {
                    const snapState = opponent.targetState
                        ? { ...opponent.targetState, x: data.data.x, y: data.data.y }
                        : { x: data.data.x, y: data.data.y, velX: 0, velY: 0,
                            hp: opponent.health, facingRight: opponent.facingRight,
                            isAttacking: false, currentWeapon: 0 };
                    opponent.prevState = null;
                    opponent.targetState = snapState;
                    opponent.interpAlpha = 1;
                }
            }
        });

        socket.on('battle_result', (data) => {
            gameState.gameOver = true;
            gameState.winner = data.winner;

            const winnerText = document.getElementById('winnerText');
            const iWon = data.winner === myPlayerNum;

            if (iWon) {
                winnerText.textContent = 'YOU WIN!';
                winnerText.style.color = '#2ecc71';
            } else {
                winnerText.textContent = 'YOU LOSE!';
                winnerText.style.color = '#e74c3c';
            }
            document.getElementById('gameOver').style.display = 'block';

            setTimeout(() => {
                if (iWon) {
                    window.location.href = '/multiplayer?reward=100';
                } else {
                    window.location.href = '/multiplayer';
                }
            }, 3000);
        });

        socket.on('player_left', () => {
            alert('Opponent disconnected!');
            window.location.href = '/multiplayer';
        });

        // =====================================================================
        // KEYBOARD EVENTS (action keys — movement is handled via keys[] in game_engine.js)
        // =====================================================================

        window.addEventListener('keydown', (e) => {
            // Weapon switching
            if (e.key === '1') myPlayer.switchWeapon(0);
            if (e.key === '2') myPlayer.switchWeapon(1);
            if (e.key === '3') myPlayer.switchWeapon(2);

            // Ability activation (Space or Enter)
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (myPlayer.activateAbility()) {
                    // Teleport: pick a safe random position (game_engine.js uses lowercase)
                    if (myPlayer.ability === 'teleport') {
                        myPlayer.x = 150 + Math.random() * (canvas.width - 300);
                        myPlayer.y = 200 + Math.random() * 200;
                        myPlayer.velX = 0;
                        myPlayer.velY = 0;
                    }
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'ability',
                        action_data: {
                            ability: myPlayer.ability,
                            x: myPlayer.x,
                            y: myPlayer.y
                        }
                    });
                }
            }

            // Attack
            if (e.key === 's' || e.key === 'ArrowDown') {
                const weapon = myPlayer.attack();
                if (weapon) {
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'attack',
                        action_data: { weapon: weapon.name }
                    });

                    // Ranged weapon projectile
                    if (weapon.type === 'ranged') {
                        const dir = myPlayer.facingRight ? 1 : -1;
                        const projX = myPlayer.facingRight ? myPlayer.x + myPlayer.width : myPlayer.x - 20;
                        gameState.projectiles.push(
                            new MPProjectile(projX, myPlayer.y + myPlayer.height/2, dir, weapon.damage, '#FFA500')
                        );
                    }
                }
            }

            // Prevent scrolling
            if (['ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        // =====================================================================
        // START
        // =====================================================================

        // Fetch shared game data, then initialize the game
        // This means game_data.py is the single source of truth for weapons, maps, and constants
        async function fetchGameData() {
            try {
                const response = await fetch('/game-data');
                GAME_DATA = await response.json();
                GRAVITY = GAME_DATA.GRAVITY;
                JUMP_STRENGTH = GAME_DATA.JUMP_STRENGTH;
                PLAYER_SPEED = GAME_DATA.PLAYER_SPEED;
                PLAYER_WIDTH = GAME_DATA.PLAYER_WIDTH;
                PLAYER_HEIGHT = GAME_DATA.PLAYER_HEIGHT;
                ATTACK_COOLDOWN = GAME_DATA.ATTACK_COOLDOWN;
                MAPS = buildMapsFromGameData(GAME_DATA.maps);
                currentMap = MAPS[mapName] || MAPS['Normal'];
            } catch (e) {
                console.warn('Could not load /game-data, using defaults:', e);
            }
            try {
                initGame();
            } catch (e) {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('initGame ERROR:', canvas.width/2, 200);
                ctx.fillStyle = 'white';
                ctx.font = '18px Arial';
                ctx.fillText(e.message, canvas.width/2, 240);
                ctx.fillStyle = 'yellow';
                ctx.font = '16px Arial';
                ctx.fillText(e.stack ? e.stack.split('\n')[1] : '', canvas.width/2, 280);
            }
        }

        fetchGameData();
        // Don't start the game loop until both players have rejoined the room.
        // gameLoop() is called from the both_ready handler (and fallback timeout) below.
    </script>
</body>
</html>
