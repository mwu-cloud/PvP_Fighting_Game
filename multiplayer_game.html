<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Battle - Mina's PVP Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        #gameCanvas {
            display: block;
            border-radius: 10px;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .healthBar {
            width: 200px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #fff;
        }

        .healthFill {
            height: 100%;
            transition: width 0.3s;
        }

        #p1Health .healthFill { background: linear-gradient(90deg, #3498db, #2980b9); }
        #p2Health .healthFill { background: linear-gradient(90deg, #e74c3c, #c0392b); }

        .playerInfo {
            text-align: center;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
        }

        .playerInfo span {
            display: block;
            margin-bottom: 5px;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            font-family: 'Press Start 2P', cursive;
            z-index: 100;
        }

        #gameOver h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #f39c12;
        }

        #gameOver p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            text-align: center;
        }

        #connectionStatus {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-family: 'VT323', monospace;
        }

        .connected { background: #27ae60; color: white; }
        .disconnected { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="connectionStatus" class="connected">Connected</div>
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="ui">
            <div class="playerInfo">
                <span>PLAYER 1</span>
                <div class="healthBar" id="p1Health">
                    <div class="healthFill" style="width: 100%"></div>
                </div>
                <span id="p1Weapon">Sword</span>
            </div>
            <div class="playerInfo">
                <span>PLAYER 2</span>
                <div class="healthBar" id="p2Health">
                    <div class="healthFill" style="width: 100%"></div>
                </div>
                <span id="p2Weapon">Sword</span>
            </div>
        </div>
        <div id="gameOver">
            <h2 id="winnerText">PLAYER 1 WINS!</h2>
            <p>Returning to lobby...</p>
        </div>
        <div id="controls">
            WASD or Arrow Keys to move | S or Down to attack | Space or Enter for ability | 1-2-3 switch weapons
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        // Get room info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const myPlayerNum = parseInt(urlParams.get('player'));
        const mapName = urlParams.get('map') || 'Normal';

        if (!roomCode || !myPlayerNum) {
            alert('Invalid game session! Returning to lobby.');
            window.location.href = '/multiplayer';
        }

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Connect to server
        const socket = io();

        // Game constants
        const GRAVITY = 0.8;
        const JUMP_STRENGTH = -15;
        const PLAYER_SPEED = 5;
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 60;

        // Keyboard state
        const keys = {};

        // Helper: Check if any key in an array is pressed
        function isKeyPressed(control) {
            if (Array.isArray(control)) {
                return control.some(key => keys[key]);
            }
            return keys[control];
        }

        // Linear interpolation helper
        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // =====================================================================
        // SEEDED RNG — both clients derive the same seed from the room code
        // so hazards spawn at exactly the same time and position on both screens
        // =====================================================================
        let hazardSeed = (function() {
            let seed = 0;
            for (let i = 0; i < roomCode.length; i++) {
                seed = (seed * 31 + roomCode.charCodeAt(i)) & 0xffffffff;
            }
            return Math.abs(seed) || 12345;
        })();

        function seededRandom() {
            hazardSeed = (hazardSeed * 1664525 + 1013904223) & 0xffffffff;
            return (hazardSeed >>> 0) / 0xffffffff;
        }

        let frameCount = 0;
        let hazardSpawnTimers = {
            comet: 0,
            nextCometThreshold: 0,
            icicle: 0,
            nextIcicleThreshold: 0,
            lavaRise: 0
        };

        // Maps data
        const MAPS = {
            'Normal': {
                platforms: [
                    {x: 0, y: 650, width: 1200, height: 50},
                    {x: 200, y: 550, width: 200, height: 20},
                    {x: 800, y: 550, width: 200, height: 20},
                    {x: 100, y: 430, width: 150, height: 20},
                    {x: 500, y: 400, width: 200, height: 20},
                    {x: 950, y: 430, width: 150, height: 20},
                    {x: 500, y: 250, width: 200, height: 20},
                ],
                hazards: []
            },
            'Comet Field': {
                platforms: [
                    {x: 0, y: 650, width: 1200, height: 50},
                    {x: 150, y: 520, width: 180, height: 20},
                    {x: 870, y: 520, width: 180, height: 20},
                    {x: 450, y: 450, width: 300, height: 20},
                    {x: 200, y: 320, width: 150, height: 20},
                    {x: 850, y: 320, width: 150, height: 20},
                    {x: 500, y: 200, width: 200, height: 20},
                ],
                hazards: ['comet']
            },
            'Volcano': {
                platforms: [
                    {x: 0, y: 650, width: 1200, height: 50},
                    {x: 100, y: 550, width: 200, height: 20},
                    {x: 900, y: 550, width: 200, height: 20},
                    {x: 400, y: 480, width: 400, height: 20},
                    {x: 150, y: 380, width: 180, height: 20},
                    {x: 870, y: 380, width: 180, height: 20},
                    {x: 450, y: 280, width: 300, height: 20},
                    {x: 500, y: 150, width: 200, height: 20},
                ],
                hazards: ['lava']
            },
            'Ice': {
                platforms: [
                    {x: 0, y: 650, width: 1200, height: 50},
                    {x: 100, y: 530, width: 200, height: 20},
                    {x: 900, y: 530, width: 200, height: 20},
                    {x: 350, y: 450, width: 150, height: 20},
                    {x: 700, y: 450, width: 150, height: 20},
                    {x: 500, y: 200, width: 200, height: 20},
                ],
                hazards: ['icicle', 'slippery']
            },
            'Alien Invasion': {
                platforms: [
                    {x: 0, y: 650, width: 450, height: 50},
                    {x: 750, y: 650, width: 450, height: 50},
                    {x: 50, y: 520, width: 180, height: 20},
                    {x: 970, y: 520, width: 180, height: 20},
                    {x: 250, y: 400, width: 150, height: 20},
                    {x: 800, y: 400, width: 150, height: 20},
                    {x: 500, y: 300, width: 200, height: 20},
                ],
                hazards: ['spaceship', 'crater']
            }
        };

        const currentMap = MAPS[mapName] || MAPS['Normal'];

        // Game state
        let gameState = {
            gameOver: false,
            winner: null,
            lavaHeight: 50,
            lavaRiseTimer: 0,
            comets: [],
            icicles: [],
            spaceships: [],
            projectiles: []
        };

        // Players
        let myPlayer = null;
        let opponent = null;

        // Load weapons from localStorage (set by lobby)
        const savedWeapons = JSON.parse(localStorage.getItem('mp_game_weapons') || '[{"name":"Sword","damage":10,"type":"melee"}]');
        const savedAbility = localStorage.getItem('mp_game_ability') || null;

        // Use first 3 weapons from inventory
        const WEAPONS = savedWeapons.slice(0, 3);
        while (WEAPONS.length < 3) {
            WEAPONS.push({name: 'Sword', damage: 10, type: 'melee'});
        }

        // =====================================================================
        // HAZARD CLASSES
        // =====================================================================

        class Comet {
            constructor() {
                this.x = seededRandom() * canvas.width;
                this.y = -50;
                this.radius = 15;
                this.speed = 5 + seededRandom() * 3;
                this.damage = 30;
                this.active = true;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.active = false;
            }
            draw() {
                // Trail
                ctx.fillStyle = 'rgba(255, 120, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y - 25, this.radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 200, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y - 45, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
                // Rock
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FF4500';
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 4, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }
            checkHit(player) {
                if (player.isInvisible()) return false;
                const dx = this.x - (player.x + player.width / 2);
                const dy = this.y - (player.y + player.height / 2);
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 20;
            }
        }

        class Icicle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 10;
                this.height = 25;
                this.speed = 6;
                this.damage = Math.floor(seededRandom() * 20) + 1;
                this.active = true;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.active = false;
            }
            draw() {
                ctx.fillStyle = '#B0E0E6';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x - this.width / 2, this.y);
                ctx.lineTo(this.x + this.width / 2, this.y);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.moveTo(this.x - 1, this.y + this.height);
                ctx.lineTo(this.x - 2, this.y + 5);
                ctx.lineTo(this.x + 1, this.y + 8);
                ctx.closePath();
                ctx.fill();
            }
            checkHit(player) {
                if (player.isInvisible()) return false;
                return this.x > player.x &&
                       this.x < player.x + player.width &&
                       this.y + this.height > player.y &&
                       this.y < player.y + player.height;
            }
        }

        class Spaceship {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 80;
                this.height = 35;
                this.beamWidth = 50;
                this.beamHeight = 300;
                this.wobble = 0;
            }
            update() {
                this.wobble += 0.03;
                this.x += Math.sin(this.wobble) * 0.5;
            }
            draw() {
                const cx = this.x;
                const cy = this.y;
                // Beam
                const grad = ctx.createLinearGradient(cx - this.beamWidth/2, cy, cx + this.beamWidth/2, cy);
                grad.addColorStop(0, 'rgba(0,255,150,0)');
                grad.addColorStop(0.5, 'rgba(0,255,150,0.25)');
                grad.addColorStop(1, 'rgba(0,255,150,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(cx - this.beamWidth/2, cy + this.height/2);
                ctx.lineTo(cx + this.beamWidth/2, cy + this.height/2);
                ctx.lineTo(cx + this.beamWidth/2 + 20, cy + this.beamHeight);
                ctx.lineTo(cx - this.beamWidth/2 - 20, cy + this.beamHeight);
                ctx.closePath();
                ctx.fill();
                // Body
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.ellipse(cx, cy, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                // Dome
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.ellipse(cx, cy - 8, this.width/3, this.height/2.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // Lights
                const lightColors = ['#ff0', '#0ff', '#f0f'];
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = lightColors[i];
                    ctx.beginPath();
                    ctx.arc(cx - 20 + i * 20, cy + 8, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            checkBeamHit(player) {
                const beamLeft = this.x - this.beamWidth/2 - 20;
                const beamRight = this.x + this.beamWidth/2 + 20;
                const beamTop = this.y + this.height/2;
                const cx = player.x + player.width/2;
                return cx > beamLeft && cx < beamRight && player.y < beamTop + this.beamHeight && player.y + player.height > beamTop;
            }
        }

        // =====================================================================
        // PLAYER CLASS
        // =====================================================================

        class Player {
            constructor(x, y, color, name, playerNum) {
                this.x = x;
                this.y = y;
                this.width = PLAYER_WIDTH;
                this.height = PLAYER_HEIGHT;
                this.color = color;
                this.name = name;
                this.playerNum = playerNum;
                this.velX = 0;
                this.velY = 0;
                this.hp = 100;
                this.maxHp = 100;
                this.onGround = false;
                this.facingRight = playerNum === 1;
                this.weapons = [WEAPONS[0], WEAPONS[1], WEAPONS[2]];
                this.currentWeapon = 0;
                this.attackCooldown = 0;
                this.isAttacking = false;
                this.attackFrame = 0;
                this.slideVel = 0;
                this.controls = {
                    left: ['a', 'ArrowLeft'],
                    right: ['d', 'ArrowRight'],
                    jump: ['w', 'ArrowUp'],
                    attack: ['s', 'ArrowDown']
                };
                // Abilities
                this.ability = null;
                this.abilityActive = false;
                this.abilityDuration = 0;
                this.abilityCooldown = 0;
                // Puppet interpolation (for opponent)
                this.isPuppet = false;
                this.prevState = null;
                this.targetState = null;
                this.interpAlpha = 0;
            }

            // --- LOCAL PLAYER: run input + physics ---
            updateLocal() {
                const isIce = currentMap.hazards.includes('slippery');
                const speed = this.hasSpeed() ? PLAYER_SPEED * 2 : PLAYER_SPEED;

                if (isKeyPressed(this.controls.left)) {
                    this.velX = -speed;
                    this.facingRight = false;
                    if (isIce && this.onGround) this.slideVel = -speed * 0.6;
                } else if (isKeyPressed(this.controls.right)) {
                    this.velX = speed;
                    this.facingRight = true;
                    if (isIce && this.onGround) this.slideVel = speed * 0.6;
                } else {
                    if (isIce && this.onGround && Math.abs(this.slideVel) > 0.1) {
                        this.x += this.slideVel;
                        this.slideVel *= 0.88;
                        this.velX = 0;
                    } else {
                        this.velX = 0;
                        this.slideVel = 0;
                    }
                }

                if (isKeyPressed(this.controls.jump) && this.onGround) {
                    this.velY = JUMP_STRENGTH;
                    this.onGround = false;
                }

                this.velY += GRAVITY;
                this.x += this.velX;
                this.y += this.velY;

                this._resolvePlatforms();
                this._resolveBoundaries();

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.isAttacking) {
                    this.attackFrame++;
                    if (this.attackFrame > 15) {
                        this.isAttacking = false;
                        this.attackFrame = 0;
                    }
                }

                this._updateAbilityTimers();
            }

            // --- OPPONENT PUPPET: smooth interpolation toward received state ---
            updatePuppet() {
                if (!this.targetState) return;

                this.interpAlpha = Math.min(this.interpAlpha + 0.2, 1.0);

                if (this.prevState) {
                    this.x = lerp(this.prevState.x, this.targetState.x, this.interpAlpha);
                    this.y = lerp(this.prevState.y, this.targetState.y, this.interpAlpha);
                } else {
                    this.x = this.targetState.x;
                    this.y = this.targetState.y;
                }

                this.facingRight = this.targetState.facingRight;
                this.isAttacking = this.targetState.isAttacking;
                this.currentWeapon = this.targetState.currentWeapon;
                this.hp = this.targetState.hp;

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.isAttacking) {
                    this.attackFrame++;
                    if (this.attackFrame > 15) {
                        this.isAttacking = false;
                        this.attackFrame = 0;
                    }
                }

                this._updateAbilityTimers();
            }

            _resolvePlatforms() {
                this.onGround = false;
                for (let plat of currentMap.platforms) {
                    if (this.x + this.width > plat.x &&
                        this.x < plat.x + plat.width &&
                        this.y + this.height > plat.y &&
                        this.y + this.height < plat.y + plat.height + 20 &&
                        this.velY >= 0) {
                        this.y = plat.y - this.height;
                        this.velY = 0;
                        this.onGround = true;
                    }
                }
            }

            _resolveBoundaries() {
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y + this.height > canvas.height) {
                    this.y = canvas.height - this.height;
                    this.onGround = true;
                    this.velY = 0;
                }
            }

            _updateAbilityTimers() {
                if (this.abilityActive && this.abilityDuration > 0) {
                    this.abilityDuration--;
                    if (this.abilityDuration === 0) {
                        this.abilityActive = false;
                        this.abilityCooldown = 600; // 10s cooldown after use
                    }
                }
                if (this.abilityCooldown > 0) this.abilityCooldown--;
            }

            // --- ABILITY METHODS ---
            activateAbility() {
                if (!this.ability || this.abilityActive || this.abilityCooldown > 0) return false;
                this.abilityActive = true;
                this.abilityDuration = 600; // 10 seconds at 60fps
                return true;
            }

            isInvisible() {
                return this.abilityActive && this.ability === 'Invisibility';
            }

            hasShield() {
                return this.abilityActive && this.ability === 'Shield';
            }

            hasSpeed() {
                return this.abilityActive && this.ability === 'Speed';
            }

            attack() {
                if (this.attackCooldown > 0) return null;
                this.attackCooldown = 30;
                this.isAttacking = true;
                this.attackFrame = 0;
                return this.weapons[this.currentWeapon];
            }

            switchWeapon(index) {
                if (index >= 0 && index < this.weapons.length) {
                    this.currentWeapon = index;
                }
            }

            takeDamage(amount) {
                if (this.hasShield()) return; // shield blocks all damage
                this.hp -= amount;
                if (this.hp < 0) this.hp = 0;
            }

            draw() {
                ctx.save();

                // Invisibility — draw faintly
                if (this.isInvisible()) {
                    ctx.globalAlpha = 0.2;
                }

                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Face direction indicator
                ctx.fillStyle = '#fff';
                const eyeX = this.facingRight ? this.x + 25 : this.x + 10;
                ctx.fillRect(eyeX, this.y + 15, 8, 8);

                // Attack animation
                if (this.isAttacking) {
                    ctx.fillStyle = '#ff0';
                    const weaponX = this.facingRight ? this.x + this.width : this.x - 30;
                    ctx.fillRect(weaponX, this.y + 20, 30, 10);
                }

                // Shield bubble
                if (this.hasShield()) {
                    ctx.globalAlpha = 0.6;
                    ctx.strokeStyle = '#64C8FF';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + this.height/2, 40, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 0.1;
                    ctx.fillStyle = '#64C8FF';
                    ctx.beginPath();
                    ctx.arc(this.x + this.width/2, this.y + this.height/2, 40, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = this.isInvisible() ? 0.2 : 1.0;
                }

                ctx.globalAlpha = 1.0;

                // Name tag
                ctx.fillStyle = '#fff';
                ctx.font = '14px VT323';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, this.x + this.width/2, this.y - 20);

                // Ability indicator bar (green=ready, gold=active, grey=cooling down)
                if (this.ability) {
                    const barW = 40;
                    const barY = this.y - 10;
                    if (this.abilityActive) {
                        ctx.fillStyle = 'rgba(255,215,0,0.9)';
                        ctx.fillRect(this.x, barY, (this.abilityDuration / 600) * barW, 4);
                    } else if (this.abilityCooldown > 0) {
                        ctx.fillStyle = 'rgba(100,100,100,0.6)';
                        ctx.fillRect(this.x, barY, ((600 - this.abilityCooldown) / 600) * barW, 4);
                    } else {
                        ctx.fillStyle = 'rgba(0,255,80,0.9)';
                        ctx.fillRect(this.x, barY, barW, 4);
                    }
                }

                ctx.restore();
            }

            getState() {
                return {
                    x: this.x,
                    y: this.y,
                    velX: this.velX,
                    velY: this.velY,
                    hp: this.hp,
                    facingRight: this.facingRight,
                    isAttacking: this.isAttacking,
                    currentWeapon: this.currentWeapon
                };
            }

            setState(state) {
                // Feed the interpolation buffer instead of snapping
                this.prevState = this.targetState ? { ...this.targetState } : { ...state };
                this.targetState = state;
                this.interpAlpha = 0;
            }
        }

        // =====================================================================
        // PROJECTILE CLASS
        // =====================================================================

        class Projectile {
            constructor(x, y, dir, damage, color) {
                this.x = x;
                this.y = y;
                this.dir = dir;
                this.speed = 12;
                this.damage = damage;
                this.color = color;
                this.width = 20;
                this.height = 8;
                this.active = true;
            }

            update() {
                this.x += this.dir * this.speed;
                if (this.x < -50 || this.x > canvas.width + 50) {
                    this.active = false;
                }
                // Check hit on opponent
                if (this.active &&
                    this.x + this.width > opponent.x &&
                    this.x < opponent.x + opponent.width &&
                    this.y + this.height > opponent.y &&
                    this.y < opponent.y + opponent.height) {
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'damage',
                        action_data: { damage: this.damage, targetPlayer: opponent.playerNum }
                    });
                    this.active = false;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        // =====================================================================
        // INIT GAME
        // =====================================================================

        function initGame() {
            const p1Color = '#3498db';
            const p2Color = '#e74c3c';

            if (myPlayerNum === 1) {
                myPlayer = new Player(100, 500, p1Color, 'Player 1', 1);
                opponent = new Player(1000, 500, p2Color, 'Player 2', 2);
            } else {
                myPlayer = new Player(1000, 500, p2Color, 'Player 2', 2);
                opponent = new Player(100, 500, p1Color, 'Player 1', 1);
            }

            opponent.isPuppet = true;

            // Assign saved ability to my player
            if (savedAbility) {
                myPlayer.ability = savedAbility;
            }

            // Initialize map-specific hazards
            if (mapName === 'Alien Invasion') {
                gameState.spaceships = [
                    new Spaceship(300, 60),
                    new Spaceship(900, 80)
                ];
            }
            if (mapName === 'Volcano') {
                gameState.lavaHeight = 50;
            }

            // Pre-roll the first spawn thresholds so both clients agree
            if (mapName === 'Comet Field') {
                hazardSpawnTimers.nextCometThreshold = Math.floor(60 + seededRandom() * 120);
            }
            if (mapName === 'Ice') {
                hazardSpawnTimers.nextIcicleThreshold = Math.floor(120 + seededRandom() * 60);
            }
        }

        // =====================================================================
        // DRAW HELPERS
        // =====================================================================

        function drawPlatforms() {
            for (let plat of currentMap.platforms) {
                if (mapName === 'Ice') {
                    ctx.fillStyle = '#a8d8f0';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fillRect(plat.x, plat.y, plat.width, 4);
                } else if (mapName === 'Volcano') {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.strokeStyle = '#ff4500';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                } else {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                }
            }
        }

        function drawBackground() {
            let gradTop, gradBot;
            if (mapName === 'Volcano') { gradTop = '#1a0000'; gradBot = '#3a0a00'; }
            else if (mapName === 'Ice') { gradTop = '#0a1a2e'; gradBot = '#0a2a4e'; }
            else if (mapName === 'Alien Invasion') { gradTop = '#000010'; gradBot = '#050520'; }
            else if (mapName === 'Comet Field') { gradTop = '#0a0a1a'; gradBot = '#1a0a2e'; }
            else { gradTop = '#1a1a2e'; gradBot = '#16213e'; }

            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, gradTop);
            gradient.addColorStop(1, gradBot);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '24px VT323';
            ctx.textAlign = 'center';
            ctx.fillText(mapName, canvas.width/2, 30);
        }

        function drawHazards() {
            // Lava (Volcano)
            if (mapName === 'Volcano' && gameState.lavaHeight > 0) {
                const lavaGrad = ctx.createLinearGradient(0, canvas.height - gameState.lavaHeight, 0, canvas.height);
                lavaGrad.addColorStop(0, '#FF6000');
                lavaGrad.addColorStop(0.4, '#FF2200');
                lavaGrad.addColorStop(1, '#AA0000');
                ctx.fillStyle = lavaGrad;
                ctx.fillRect(0, canvas.height - gameState.lavaHeight, canvas.width, gameState.lavaHeight);
                // Lava surface shimmer
                ctx.fillStyle = 'rgba(255,200,0,0.3)';
                ctx.fillRect(0, canvas.height - gameState.lavaHeight, canvas.width, 4);
            }

            // Crater + spaceships (Alien Invasion)
            if (mapName === 'Alien Invasion') {
                // Crater
                ctx.fillStyle = '#020210';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 85, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#1a1a40';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 85, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,0,50,0.15)';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height - 50, 60, 0, Math.PI * 2);
                ctx.fill();

                // Ships + beams
                for (let ship of gameState.spaceships) {
                    ship.draw();
                }
            }

            // Comets
            for (let c of gameState.comets) c.draw();

            // Icicles
            for (let ic of gameState.icicles) ic.draw();
        }

        function updateUI() {
            const p1 = myPlayerNum === 1 ? myPlayer : opponent;
            const p2 = myPlayerNum === 2 ? myPlayer : opponent;

            document.querySelector('#p1Health .healthFill').style.width = (p1.hp / p1.maxHp * 100) + '%';
            document.querySelector('#p2Health .healthFill').style.width = (p2.hp / p2.maxHp * 100) + '%';
            document.getElementById('p1Weapon').textContent = p1.weapons[p1.currentWeapon].name;
            document.getElementById('p2Weapon').textContent = p2.weapons[p2.currentWeapon].name;
        }

        // =====================================================================
        // ATTACK COLLISION
        // =====================================================================

        function checkAttackCollision() {
            if (myPlayer.isAttacking && myPlayer.attackFrame === 5) {
                const weapon = myPlayer.weapons[myPlayer.currentWeapon];
                if (weapon.type === 'melee') {
                    const attackRange = 60;
                    let hitX, hitWidth;
                    if (myPlayer.facingRight) {
                        hitX = myPlayer.x + myPlayer.width;
                        hitWidth = attackRange;
                    } else {
                        hitX = myPlayer.x - attackRange;
                        hitWidth = attackRange;
                    }

                    if (opponent.x + opponent.width > hitX &&
                        opponent.x < hitX + hitWidth &&
                        opponent.y + opponent.height > myPlayer.y &&
                        opponent.y < myPlayer.y + myPlayer.height) {
                        socket.emit('player_action', {
                            code: roomCode,
                            action: 'damage',
                            action_data: { damage: weapon.damage, targetPlayer: opponent.playerNum }
                        });
                    }
                }
            }
        }

        // =====================================================================
        // HAZARD UPDATES (deterministic — runs same on both clients)
        // =====================================================================

        function updateHazards() {
            // --- Comet Field ---
            if (mapName === 'Comet Field') {
                hazardSpawnTimers.comet++;
                if (hazardSpawnTimers.comet >= hazardSpawnTimers.nextCometThreshold) {
                    gameState.comets.push(new Comet());
                    hazardSpawnTimers.comet = 0;
                    hazardSpawnTimers.nextCometThreshold = Math.floor(60 + seededRandom() * 120);
                }
                for (let i = gameState.comets.length - 1; i >= 0; i--) {
                    const c = gameState.comets[i];
                    c.update();
                    if (!c.active) { gameState.comets.splice(i, 1); continue; }
                    if (c.checkHit(myPlayer)) {
                        myPlayer.takeDamage(c.damage);
                        gameState.comets.splice(i, 1);
                    }
                }
            }

            // --- Ice ---
            if (mapName === 'Ice') {
                hazardSpawnTimers.icicle++;
                if (hazardSpawnTimers.icicle >= hazardSpawnTimers.nextIcicleThreshold) {
                    const highPlatform = currentMap.platforms[currentMap.platforms.length - 1];
                    const numIcicles = 3 + Math.floor(seededRandom() * 3);
                    for (let i = 0; i < numIcicles; i++) {
                        const ix = highPlatform.x + seededRandom() * highPlatform.width;
                        gameState.icicles.push(new Icicle(ix, highPlatform.y));
                    }
                    hazardSpawnTimers.icicle = 0;
                    hazardSpawnTimers.nextIcicleThreshold = Math.floor(120 + seededRandom() * 60);
                }
                for (let i = gameState.icicles.length - 1; i >= 0; i--) {
                    const ic = gameState.icicles[i];
                    ic.update();
                    if (!ic.active) { gameState.icicles.splice(i, 1); continue; }
                    if (ic.checkHit(myPlayer)) {
                        myPlayer.takeDamage(ic.damage);
                        gameState.icicles.splice(i, 1);
                    }
                }
            }

            // --- Volcano: rising lava ---
            if (mapName === 'Volcano') {
                hazardSpawnTimers.lavaRise++;
                if (hazardSpawnTimers.lavaRise >= 1200) {
                    gameState.lavaHeight = Math.min(gameState.lavaHeight + 80, 420);
                    hazardSpawnTimers.lavaRise = 0;
                }
                const lavaY = canvas.height - gameState.lavaHeight;
                if (myPlayer.y + myPlayer.height >= lavaY) {
                    myPlayer.takeDamage(5);
                }
            }

            // --- Alien Invasion: beam lift + crater death ---
            if (mapName === 'Alien Invasion') {
                for (let ship of gameState.spaceships) {
                    ship.update();
                    if (ship.checkBeamHit(myPlayer)) {
                        myPlayer.y = Math.max(myPlayer.y - 4, 50);
                        myPlayer.velY = 0;
                    }
                }
                // Crater instant death
                const craterX = canvas.width / 2;
                const craterRadius = 85;
                const myCx = myPlayer.x + myPlayer.width / 2;
                const myFeet = myPlayer.y + myPlayer.height;
                const dist = Math.sqrt(Math.pow(myCx - craterX, 2) + Math.pow(myFeet - (canvas.height - 50), 2));
                if (dist < craterRadius && myFeet > canvas.height - 120) {
                    myPlayer.hp = 0;
                }
            }
        }

        // =====================================================================
        // GAME LOOP
        // =====================================================================

        let lastSendTime = 0;

        function gameLoop() {
            if (gameState.gameOver) return;

            frameCount++;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            // Draw hazards behind platforms (lava, crater, beams)
            drawHazards();

            // Draw platforms
            drawPlatforms();

            // Update players
            myPlayer.updateLocal();
            opponent.updatePuppet();

            // Update hazards (damage + spawning)
            updateHazards();

            // Check melee attack collision
            checkAttackCollision();

            // Draw players
            const p1 = myPlayerNum === 1 ? myPlayer : opponent;
            const p2 = myPlayerNum === 2 ? myPlayer : opponent;
            p1.draw();
            p2.draw();

            // Draw projectiles
            for (let proj of gameState.projectiles) {
                proj.update();
                proj.draw();
            }
            gameState.projectiles = gameState.projectiles.filter(p => p.active);

            // Update UI
            updateUI();

            // Send my position to server (throttled to 20x/second)
            const now = Date.now();
            if (now - lastSendTime > 50) {
                socket.emit('player_action', {
                    code: roomCode,
                    action: 'move',
                    action_data: myPlayer.getState()
                });
                lastSendTime = now;
            }

            // Win condition
            if (opponent.hp <= 0 && !gameState.gameOver) {
                gameState.gameOver = true;
                gameState.winner = myPlayerNum;
                socket.emit('game_over', { code: roomCode, winner: myPlayerNum });
            }
            if (myPlayer.hp <= 0 && !gameState.gameOver) {
                gameState.gameOver = true;
                gameState.winner = opponent.playerNum;
                socket.emit('game_over', { code: roomCode, winner: opponent.playerNum });
            }

            requestAnimationFrame(gameLoop);
        }

        // =====================================================================
        // SOCKET EVENTS
        // =====================================================================

        socket.on('connect', () => {
            document.getElementById('connectionStatus').className = 'connected';
            document.getElementById('connectionStatus').textContent = 'Connected';
            socket.emit('rejoin_game', { code: roomCode, player: myPlayerNum });
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').className = 'disconnected';
            document.getElementById('connectionStatus').textContent = 'Disconnected';
        });

        socket.on('opponent_action', (data) => {
            if (data.action === 'move') {
                opponent.setState(data.data);

            } else if (data.action === 'damage') {
                if (data.data.targetPlayer === myPlayerNum) {
                    myPlayer.takeDamage(data.data.damage);
                }

            } else if (data.action === 'attack') {
                opponent.isAttacking = true;
                opponent.attackFrame = 0;

            } else if (data.action === 'ability') {
                opponent.ability = data.data.ability;
                opponent.abilityActive = true;
                opponent.abilityDuration = 600;
                // Teleport: snap puppet to the received position immediately
                if (data.data.ability === 'Teleport') {
                    const snapState = opponent.targetState
                        ? { ...opponent.targetState, x: data.data.x, y: data.data.y }
                        : { x: data.data.x, y: data.data.y, velX: 0, velY: 0,
                            hp: opponent.hp, facingRight: opponent.facingRight,
                            isAttacking: false, currentWeapon: 0 };
                    opponent.prevState = null;
                    opponent.targetState = snapState;
                    opponent.interpAlpha = 1;
                }
            }
        });

        socket.on('battle_result', (data) => {
            gameState.gameOver = true;
            gameState.winner = data.winner;

            const winnerText = document.getElementById('winnerText');
            const iWon = data.winner === myPlayerNum;

            if (iWon) {
                winnerText.textContent = 'YOU WIN!';
                winnerText.style.color = '#2ecc71';
            } else {
                winnerText.textContent = 'YOU LOSE!';
                winnerText.style.color = '#e74c3c';
            }
            document.getElementById('gameOver').style.display = 'block';

            setTimeout(() => {
                if (iWon) {
                    window.location.href = '/multiplayer?reward=100';
                } else {
                    window.location.href = '/multiplayer';
                }
            }, 3000);
        });

        socket.on('player_left', () => {
            alert('Opponent disconnected!');
            window.location.href = '/multiplayer';
        });

        // =====================================================================
        // KEYBOARD EVENTS
        // =====================================================================

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // Weapon switching
            if (e.key === '1') myPlayer.switchWeapon(0);
            if (e.key === '2') myPlayer.switchWeapon(1);
            if (e.key === '3') myPlayer.switchWeapon(2);

            // Ability activation (Space or Enter)
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (myPlayer.activateAbility()) {
                    // Teleport: pick a safe random position
                    if (myPlayer.ability === 'Teleport') {
                        myPlayer.x = 150 + Math.random() * (canvas.width - 300);
                        myPlayer.y = 200 + Math.random() * 200;
                        myPlayer.velX = 0;
                        myPlayer.velY = 0;
                    }
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'ability',
                        action_data: {
                            ability: myPlayer.ability,
                            x: myPlayer.x,
                            y: myPlayer.y
                        }
                    });
                }
            }

            // Attack
            if (e.key === 's' || e.key === 'ArrowDown') {
                const weapon = myPlayer.attack();
                if (weapon) {
                    socket.emit('player_action', {
                        code: roomCode,
                        action: 'attack',
                        action_data: { weapon: weapon.name }
                    });

                    // Ranged weapon projectile
                    if (weapon.type === 'ranged') {
                        const dir = myPlayer.facingRight ? 1 : -1;
                        const projX = myPlayer.facingRight ? myPlayer.x + myPlayer.width : myPlayer.x - 20;
                        gameState.projectiles.push(
                            new Projectile(projX, myPlayer.y + myPlayer.height/2, dir, weapon.damage, '#FFA500')
                        );
                    }
                }
            }

            // Prevent scrolling
            if (['ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // =====================================================================
        // START
        // =====================================================================

        initGame();
        gameLoop();
    </script>
</body>
</html>
